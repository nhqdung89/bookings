<div id="popup" style="display:none; position:fixed; top:20%; left:50%; transform:translateX(-50%);

<script>

async function openPopup(ban){
  document.getElementById("popup").style.display = "block";

  const { data } = await supabaseClient
    .from("bookings")
    .select("*")
    .eq("ban", ban)
    .single();

  if(data){
    document.getElementById("id").value = data.id;
    document.getElementById("ban").value = data.ban;
    document.getElementById("ten").value = data.ten;
    document.getElementById("gio").value = data.gio;
    document.getElementById("sokhach").value = data.sokhach;
    document.getElementById("ghichu").value = data.ghichu;
  } else {
    document.getElementById("id").value = "";
    document.getElementById("ban").value = ban;
    document.getElementById("ten").value = "";
    document.getElementById("gio").value = "";
    document.getElementById("sokhach").value = "";
    document.getElementById("ghichu").value = "";
  }
}

function closePopup(){
  document.getElementById("popup").style.display = "none";
}

async function save(){
  const id = document.getElementById("id").value;

  const data = {
    ban: document.getElementById("ban").value,
    ten: document.getElementById("ten").value,
    gio: document.getElementById("gio").value,
    sokhach: document.getElementById("sokhach").value,
    ghichu: document.getElementById("ghichu").value
  };

  if(id){
    // UPDATE
    await supabaseClient.from("bookings")
      .update(data)
      .eq("id", id);
  } else {
    // INSERT
    await supabaseClient.from("bookings")
      .insert([data]);
  }

  closePopup();
  loadData(); // reload UI
}

async function remove(){
  const id = document.getElementById("id").value;

  if(!id) return;

  await supabaseClient.from("bookings")
    .delete()
    .eq("id", id);

  closePopup();
  loadData();
}
/* ===== LOADDATA ===== */
async function loadData(){
  const { data, error } = await supabaseClient
    .from("bookings")
    .select("*");

  if(error){
    console.log("❌ Load lỗi:", error);
    return;
  }

  console.log("✅ Data:", data);
  // reset bàn
  document.querySelectorAll(".table").forEach(t=>{
    t.className="table";
    t.innerHTML = t.dataset.ban;
  });

  data.forEach(row=>{
    const el = document.querySelector(`[data-ban='${row.ban}']`);
    if(!el) return;

    el.classList.add("booked");

    el.innerHTML = `
      <div>${row.ban}</div>
      <div class="small">${row.gio}</div>
      <div class="small">${row.ten} (${row.sokhach})</div>
    `;
  });


  // reset highlight
  document.querySelectorAll(".table").forEach(el=>{
    el.classList.remove("booked");
  });

  data.forEach(row=>{
    const el = document.querySelector(`[data-ban="${row.ban}"]`);
    if(el){
      el.classList.add("booked");
    }
  });
}

loadData();

/* ===== STATE ===== */
let selected = [];
let history = [];
let redoStack = [];

let isDragging = false;
let startX = 0;
let startY = 0;

/* ===== SAVE STATE ===== */
function saveState(){
  const snapshot = tables.map(t => [...t]);
  history.push(snapshot);
  if(history.length > 50) history.shift();
  redoStack = [];
}

/* ===== RESTORE ===== */
function restoreState(state){
  state.forEach((t,i)=>{
    tables[i][1] = t[1];
    tables[i][2] = t[2];

    const el = document.querySelector(`[data-index='${i}']`);
    if(el){
      el.style.top = t[1] + "px";
      el.style.left = t[2] + "px";
    }
  });
}

let lastClickTime = 0;
let isMouseDown = false;

document.addEventListener("mousedown", function(e){
  const el = e.target.closest(".table");
  if(!el) return;

  const now = Date.now();

  // DOUBLE CLICK
  if(now - lastClickTime < 300){
    openPopup(el.dataset.ban);
    lastClickTime = 0;
    return;
  }
  lastClickTime = now;

  const isMulti = e.metaKey || e.ctrlKey;

  // SELECT
  if(!isMulti){
    selected.forEach(t => t.classList.remove("selected"));
    selected = [el];
    el.classList.add("selected");
  } else {
    if(selected.includes(el)){
      el.classList.remove("selected");
      selected = selected.filter(t => t !== el);
    } else {
      selected.push(el);
      el.classList.add("selected");
    }
  }

  // DRAG
  isMouseDown = true;
  startX = e.clientX;
  startY = e.clientY;
  saveState();
});

const threshold = 5;

document.addEventListener("mousemove", function(e){
  if(!isMouseDown) return;

  const dx = e.clientX - startX;
  const dy = e.clientY - startY;

  // 👉 chưa di chuyển đủ → KHÔNG drag
  if(Math.abs(dx) < threshold && Math.abs(dy) < threshold) return;

  isDragging = true;

  selected.forEach(el=>{
    const index = el.dataset.index;

    tables[index][1] += dy;
    tables[index][2] += dx;

    el.style.top = tables[index][1] + "px";
    el.style.left = tables[index][2] + "px";
  });

  startX = e.clientX;
  startY = e.clientY;
});

document.addEventListener("mouseup", function(){
  isDragging = false;
  isMouseDown = false;
});

/* ===== MOVE BY KEY ===== */
document.addEventListener("keydown", function(e){

  if(selected.length === 0) return;

  let dx = 0, dy = 0;

  switch(e.key){
    case "ArrowUp": dy = -10; break;
    case "ArrowDown": dy = 10; break;
    case "ArrowLeft": dx = -10; break;
    case "ArrowRight": dx = 10; break;
    default: return;
  }

  e.preventDefault();
  saveState();

  selected.forEach(el=>{
    const index = el.dataset.index;

    tables[index][1] += dy;
    tables[index][2] += dx;

    el.style.top = tables[index][1] + "px";
    el.style.left = tables[index][2] + "px";
  });
});

/* ===== UNDO / REDO ===== */
document.addEventListener("keydown", function(e){

  if((e.metaKey || e.ctrlKey) && e.key === "z"){
    if(history.length === 0) return;

    const current = tables.map(t => [...t]);
    redoStack.push(current);

    const prev = history.pop();
    restoreState(prev);
  }

  if(
    (e.metaKey && e.shiftKey && e.key === "z") ||
    (e.ctrlKey && e.key === "y")
  ){
    if(redoStack.length === 0) return;

    const current = tables.map(t => [...t]);
    history.push(current);

    const next = redoStack.pop();
    restoreState(next);
  }
});
/* ===== EXPORT TỌA ĐỘ ===== */

  tables.forEach(t=>{

  });

  result += "];";

  console.log(result);
  navigator.clipboard.writeText(result);

  alert("Đã copy tọa độ!");

/* ===== SEARCH ===== */

function normalizeTime(input){
  input = input.toLowerCase().replace(/\s/g, "");

  if(/^\d{1,2}h$/.test(input)){
    let h = parseInt(input);
    if(h < 12) h += 12;
    return h + ":00";
  }

  if(/^\d{1,2}g\d{1,2}$/.test(input)){
    let parts = input.split("g");
    let h = parseInt(parts[0]);
    let m = parts[1];
    if(h < 12) h += 12;
    return h + ":" + m.padStart(2, "0");
  }

  if(/^\d{1,2}:\d{1,2}$/.test(input)){
    let parts = input.split(":");
    let h = parseInt(parts[0]);
    let m = parts[1];
    if(h < 12) h += 12;
    return h + ":" + m.padStart(2, "0");
  }

  return input;
}
function searchTable(){
  let keyword = document.getElementById("searchInput").value.toLowerCase().trim();

  // Nếu rỗng → reset toàn bộ
  if(keyword === ""){
    clearSearch();
    return;
  }

  const normalized = normalizeTime(keyword);

  document.querySelectorAll(".table").forEach(el => {
    const text = el.innerText.toLowerCase();

    if(text.includes(keyword) || text.includes(normalized)){
      el.style.opacity = "1";
      el.style.outline = "4px solid yellow";
    } else {
      el.style.opacity = "0.2";
      el.style.outline = "";
    }
  });
}
function clearSearch(){
  document.getElementById("searchInput").value = "";

  document.querySelectorAll(".table").forEach(el => {
    el.style.opacity = "1";
    el.style.outline = ""; // ❗ reset viền vàng
  });
}
