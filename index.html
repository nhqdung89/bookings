/* ===== LOADDATA ===== */
async function loadData() {
    try {
      const { data, error } = await supabaseClient.from("bookings").select("*");
      if (error) throw error;

      document.querySelectorAll(".table").forEach(t => {
        t.className = "table";
        t.innerHTML = t.dataset.ban;
      });

      data.forEach(row => {
        const el = document.querySelector(`[data-ban='${row.ban}']`);
        if (!el) return;
        el.classList.add("booked");
        el.innerHTML = `
          <div>${row.ban}</div>
          <div class="small">${row.gio || '—'}</div>
          <div class="small">${row.ten || '—'} ${row.sokhach ? `(${row.sokhach})` : ''}</div>
        `;
      });
    } catch (err) {
      console.error("Load bookings lỗi:", err);
    }
  }

async function openPopup(ban) {
  const el = document.querySelector(`[data-ban="${ban}"]`);
  const popup = document.getElementById("popup");
  const card = document.getElementById("popupCard");

  // Load dữ liệu cũ
  const { data } = await supabaseClient
    .from("bookings")
    .select("*")
    .eq("ban", ban)
    .maybeSingle();

  document.getElementById("id").value = data?.id || "";
  document.getElementById("ban").value = ban;
  document.getElementById("ten").value = data?.ten || "";
  document.getElementById("gio").value = data?.gio ? data.gio.slice(0,5) : "";
  document.getElementById("sokhach").value = data?.sokhach || "";
  document.getElementById("ghichu").value = data?.ghichu || "";

  document.getElementById("popupBanTitle").textContent = ban;

  // Tính vị trí popup gần bàn
  if (el) {
    const rect = el.getBoundingClientRect();
    let left = rect.left + window.scrollX + 80;
    let top = rect.top + window.scrollY - 20;

    // Tránh tràn màn hình
    if (left + 440 > window.innerWidth) left = rect.right + window.scrollX - 460;
    if (top + 380 > window.innerHeight) top = rect.bottom + window.scrollY - 400;

    card.style.left = left + "px";
    card.style.top = top + "px";
  } else {
    // Nếu không tìm thấy bàn, hiện giữa màn hình
    card.style.left = "50%";
    card.style.top = "50%";
    card.style.transform = "translate(-50%, -50%)";
  }

  popup.style.display = "block";
  setTimeout(() => popup.classList.add("show"), 10);
}

function closePopup() {

        await supabaseClient.from("bookings").update(data).eq("id", id);

    try {

      await loadData();
    } catch (err) {
      console.error("Xóa lỗi:", err);

/* ===== STATE ===== */
let selected = [];
let history = [];
let redoStack = [];

let isDragging = false;
let startX = 0;
let startY = 0;

/* ===== SAVE STATE ===== */
function saveState(){
  const snapshot = tables.map(t => [...t]);
  history.push(snapshot);
  if(history.length > 50) history.shift();
  redoStack = [];
}

/* ===== RESTORE ===== */
function restoreState(state){
  state.forEach((t,i)=>{
    tables[i][1] = t[1];
    tables[i][2] = t[2];

    const el = document.querySelector(`[data-index='${i}']`);
    if(el){
      el.style.top = t[1] + "px";
      el.style.left = t[2] + "px";
    }
  });
}


let lastClickTime = 0;
let isMouseDown = false;

document.addEventListener("mousedown", function(e) {
  // Chỉ xử lý nếu click bên trong #map
  const map = document.getElementById("map");
  if (!map.contains(e.target)) return;

  const el = e.target.closest(".table");

  // Trường hợp 1: Click vào chỗ trống (không phải bàn) → bỏ chọn hết
  if (!el) {
    // Bỏ chọn tất cả bàn
    document.querySelectorAll(".table.selected").forEach(t => {
      t.classList.remove("selected");
    });
    selected = [];  // reset mảng selected

    // Ngăn chặn text selection hoặc hành vi mặc định nếu cần
    // e.preventDefault(); // optional, thường không cần
    return;
  }

  // Trường hợp 2: Click vào bàn → xử lý chọn / double-click như cũ
  const now = Date.now();

  // DOUBLE CLICK → mở popup
  if (now - lastClickTime < 300) {
    openPopup(el.dataset.ban);
    lastClickTime = 0;
    return;
  }
  lastClickTime = now;

  const isMulti = e.metaKey || e.ctrlKey;

  // SELECT bàn
  if (!isMulti) {
    selected.forEach(t => t.classList.remove("selected"));
    selected = [el];
    el.classList.add("selected");
  } else {
    if (selected.includes(el)) {
      el.classList.remove("selected");
      selected = selected.filter(t => t !== el);
    } else {
      selected.push(el);
      el.classList.add("selected");
    }
  }

  // Bắt đầu drag
  isMouseDown = true;
  startX = e.clientX;
  startY = e.clientY;
  saveState();
});

const threshold = 5;

document.addEventListener("mousemove", function(e){
  if(!isMouseDown) return;

  const dx = e.clientX - startX;
  const dy = e.clientY - startY;

  // 👉 chưa di chuyển đủ → KHÔNG drag
  if(Math.abs(dx) < threshold && Math.abs(dy) < threshold) return;

  isDragging = true;

  selected.forEach(el=>{
    const index = el.dataset.index;

    tables[index][1] += dy;
    tables[index][2] += dx;

    el.style.top = tables[index][1] + "px";
    el.style.left = tables[index][2] + "px";
  });

  startX = e.clientX;
  startY = e.clientY;
});

document.addEventListener("mouseup", function(){
  isDragging = false;
  isMouseDown = false;
});

/* ===== MOVE BY KEY ===== */
document.addEventListener("keydown", function(e){

  if(selected.length === 0) return;

  let dx = 0, dy = 0;

  switch(e.key){
    case "ArrowUp": dy = -10; break;
    case "ArrowDown": dy = 10; break;
    case "ArrowLeft": dx = -10; break;
    case "ArrowRight": dx = 10; break;
    default: return;
  }

  e.preventDefault();
  saveState();

  selected.forEach(el=>{
    const index = el.dataset.index;

    tables[index][1] += dy;
    tables[index][2] += dx;

    el.style.top = tables[index][1] + "px";
    el.style.left = tables[index][2] + "px";
  });
});

/* ===== UNDO / REDO ===== */
document.addEventListener("keydown", function(e){

  if((e.metaKey || e.ctrlKey) && e.key === "z"){
    if(history.length === 0) return;

    const current = tables.map(t => [...t]);
    redoStack.push(current);

    const prev = history.pop();
    restoreState(prev);
  }

  if(
    (e.metaKey && e.shiftKey && e.key === "z") ||
    (e.ctrlKey && e.key === "y")
  ){
    if(redoStack.length === 0) return;

    const current = tables.map(t => [...t]);
    history.push(current);

    const next = redoStack.pop();
    restoreState(next);
  }
});
/* ===== EXPORT TỌA ĐỘ ===== */
function exportTables(){
  let result = "const tables = [\n";

  tables.forEach(t=>{
    result += `  [${t[0]},${Math.round(t[1])},${Math.round(t[2])}],\n`;
  });

  result += "];";

  console.log(result);
  navigator.clipboard.writeText(result);

  alert("Đã copy tọa độ!");
}
/* ===== SEARCH ===== */

function normalizeTime(input){
  input = input.toLowerCase().replace(/\s/g, "");

  if(/^\d{1,2}h$/.test(input)){
    let h = parseInt(input);
    if(h < 12) h += 12;
    return h + ":00";
  }

  if(/^\d{1,2}g\d{1,2}$/.test(input)){
    let parts = input.split("g");
    let h = parseInt(parts[0]);
    let m = parts[1];
    if(h < 12) h += 12;
    return h + ":" + m.padStart(2, "0");
  }

  if(/^\d{1,2}:\d{1,2}$/.test(input)){
    let parts = input.split(":");
    let h = parseInt(parts[0]);
    let m = parts[1];
    if(h < 12) h += 12;
    return h + ":" + m.padStart(2, "0");
  }

  return input;
}
function searchTable(){
  let keyword = document.getElementById("searchInput").value.toLowerCase().trim();

  // Nếu rỗng → reset toàn bộ
  if(keyword === ""){
    clearSearch();
    return;
  }

  const normalized = normalizeTime(keyword);

  document.querySelectorAll(".table").forEach(el => {
    const text = el.innerText.toLowerCase();

    if(text.includes(keyword) || text.includes(normalized)){
      el.style.opacity = "1";
      el.style.outline = "4px solid yellow";
    } else {
      el.style.opacity = "0.2";
      el.style.outline = "";
    }
  });
}
function clearSearch(){
  document.getElementById("searchInput").value = "";

  document.querySelectorAll(".table").forEach(el => {
    el.style.opacity = "1";
    el.style.outline = ""; // ❗ reset viền vàng
  });
}
// Export các hàm search ra global để HTML dùng được
window.searchTable = searchTable;
window.clearSearch = clearSearch;
