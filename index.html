}
#popup.show .popup-card {

    // ================== HÀM OPENPOPUP CUỐI CÙNG (ĐÃ SỬA) ==================
async function openPopup(ban) {
  const popup = document.getElementById("popup");

  const { data } = await supabaseClient
    .from("bookings")
    .select("*")
    .eq("ban", ban)
    .eq("ngay", currentDate)   // chỉ lấy theo ngày đang chọn
    .maybeSingle();

  document.getElementById("id").value = data?.id || "";
  document.getElementById("ban").value = ban;
  document.getElementById("ten").value = data?.ten || "";
  document.getElementById("sokhach").value = data?.sokhach || "";
  document.getElementById("ghichu").value = data?.ghichu || "";

  // === SET NGÀY MẶC ĐỊNH ===
  document.getElementById("ngay").value = data?.ngay || currentDate;

  // === SET GIỜ MẶC ĐỊNH 19:00:00 ===
  const hourSelect   = document.getElementById("hour");
  const minuteSelect = document.getElementById("minute");
  const secondSelect = document.getElementById("second");

  hourSelect.innerHTML = "";
  for (let i = 0; i <= 23; i++) {
    const opt = document.createElement("option");
    opt.value = i.toString().padStart(2, '0');
    opt.textContent = opt.value;
    hourSelect.appendChild(opt);
  }
  [minuteSelect, secondSelect].forEach(sel => {
    sel.innerHTML = "";
    for (let i = 0; i <= 59; i++) {
      const opt = document.createElement("option");
      opt.value = i.toString().padStart(2, '0');
      opt.textContent = opt.value;
      sel.appendChild(opt);
    }
  });

  if (data?.gio) {
    const [h, m, s] = data.gio.split(":");
    hourSelect.value   = h || "19";
    minuteSelect.value = m || "00";
    secondSelect.value = s || "00";
  } else {
    hourSelect.value   = "19";
    minuteSelect.value = "00";
    secondSelect.value = "00";
  }

  document.getElementById("popupBanTitle").textContent = ban;
  popup.style.display = "block";
  setTimeout(() => popup.classList.add("show"), 10);
}

  // Buộc gán lại hàm mới vào window
  window.openPopup = openPopup;
// ──────────────────────────────────────────────
// Các hàm async dùng supabase
// ──────────────────────────────────────────────
/* ===== LOADDATA ===== */
  async function loadData() {
  try {
    const { data, error } = await supabaseClient
      .from("bookings")
      .select("*")
      .eq("ngay", currentDate);     // ← dùng currentDate

    if (error) throw error;

    // Reset tất cả bàn
    document.querySelectorAll(".table").forEach(t => {
      t.className = "table";
      t.innerHTML = t.dataset.ban;
    });

    // Hiển thị dữ liệu

      const el = document.querySelector(`[data-ban='${row.ban}']`);

      el.classList.add("booked");

        <div class="small">${displayTime}</div>
        <div class="small">${row.ten || '—'} ${row.sokhach ? `(${row.sokhach})` : ''}</div>

  }
}
    
  function closePopup() {
    const popup = document.getElementById("popup");
    popup.classList.remove("show");
    setTimeout(() => {
      popup.style.display = "none";
    }, 350);
  }

  
async function save() {
  const id = document.getElementById("id").value.trim();

  const hour   = document.getElementById("hour").value;
  const minute = document.getElementById("minute").value;
  const second = document.getElementById("second").value;

  const data = {
    ban:     document.getElementById("ban").value.trim(),
    ten:     document.getElementById("ten").value.trim(),
    gio:     `${hour}:${minute}:${second}`,
    sokhach: document.getElementById("sokhach").value.trim(),
    ghichu:  document.getElementById("ghichu").value.trim(),
    ngay:    document.getElementById("ngay").value   // ← LƯU NGÀY TỪ Ô INPUT
  };

  if (!data.ten) return alert("Vui lòng nhập tên khách!");
  if (!data.ngay) return alert("Vui lòng chọn ngày!");

  try {
    if (id) {
      await supabaseClient.from("bookings").update(data).eq("id", id);
    } else {
      await supabaseClient.from("bookings").insert([data]);
    }
    closePopup();
    await loadData();
  } catch (err) {
    console.error("Save lỗi:", err);
    alert("Lưu thất bại: " + err.message);
  }
}
  async function remove() {
    const id = document.getElementById("id").value.trim();
    if (!id) return;
    if (!confirm("Xóa đặt bàn này thật chứ?")) return;

    try {
      await supabaseClient.from("bookings").delete().eq("id", id);
      closePopup();
      await loadData();
    } catch (err) {
      console.error("Xóa lỗi:", err);
      alert("Xóa thất bại: " + err.message);
    }
  }

  // Export ra window để HTML onclick và event dùng được
  window.closePopup = closePopup;
  window.save       = save;
  window.remove     = remove;

  // Load dữ liệu ban đầu
  loadData();

// === TEST KẾT NỐI (chỉ để kiểm tra) ===

});

/* ===== STATE ===== */
let selected = [];
let history = [];
let redoStack = [];

let isDragging = false;
let startX = 0;
let startY = 0;

/* ===== SAVE STATE ===== */
function saveState(){
  const snapshot = tables.map(t => [...t]);
  history.push(snapshot);
  if(history.length > 50) history.shift();
  redoStack = [];
}

/* ===== RESTORE ===== */
function restoreState(state){
  state.forEach((t,i)=>{
    tables[i][1] = t[1];
    tables[i][2] = t[2];

    const el = document.querySelector(`[data-index='${i}']`);
    if(el){
      el.style.top = t[1] + "px";
      el.style.left = t[2] + "px";
    }
  });
}


let lastClickTime = 0;
let isMouseDown = false;

document.addEventListener("mousedown", function(e) {
  // Chỉ xử lý nếu click bên trong #map
  const map = document.getElementById("map");
  if (!map.contains(e.target)) return;

  const el = e.target.closest(".table");

  // Trường hợp 1: Click vào chỗ trống (không phải bàn) → bỏ chọn hết
  if (!el) {
    // Bỏ chọn tất cả bàn
    document.querySelectorAll(".table.selected").forEach(t => {
      t.classList.remove("selected");
    });
    selected = [];  // reset mảng selected

    // Ngăn chặn text selection hoặc hành vi mặc định nếu cần
    // e.preventDefault(); // optional, thường không cần
    return;
  }

  // Trường hợp 2: Click vào bàn → xử lý chọn / double-click như cũ
  const now = Date.now();

  // DOUBLE CLICK → mở popup
  if (now - lastClickTime < 300) {
    openPopup(el.dataset.ban);
    lastClickTime = 0;
    return;
  }
  lastClickTime = now;

  const isMulti = e.metaKey || e.ctrlKey;

  // SELECT bàn
  if (!isMulti) {
    selected.forEach(t => t.classList.remove("selected"));
    selected = [el];
    el.classList.add("selected");
  } else {
    if (selected.includes(el)) {
      el.classList.remove("selected");
      selected = selected.filter(t => t !== el);
    } else {
      selected.push(el);
      el.classList.add("selected");
    }
  }

  // Bắt đầu drag
  isMouseDown = true;
  startX = e.clientX;
  startY = e.clientY;
  saveState();
});

const threshold = 5;

document.addEventListener("mousemove", function(e){
  if(!isMouseDown) return;

  const dx = e.clientX - startX;
  const dy = e.clientY - startY;

  // 👉 chưa di chuyển đủ → KHÔNG drag
  if(Math.abs(dx) < threshold && Math.abs(dy) < threshold) return;

  isDragging = true;

  selected.forEach(el=>{
    const index = el.dataset.index;

    tables[index][1] += dy;
    tables[index][2] += dx;

    el.style.top = tables[index][1] + "px";
    el.style.left = tables[index][2] + "px";
  });

  startX = e.clientX;
  startY = e.clientY;
});

document.addEventListener("mouseup", function(){
  isDragging = false;
  isMouseDown = false;
});

/* ===== MOVE BY KEY ===== */
document.addEventListener("keydown", function(e){

  if(selected.length === 0) return;

  let dx = 0, dy = 0;

  switch(e.key){
    case "ArrowUp": dy = -10; break;
    case "ArrowDown": dy = 10; break;
    case "ArrowLeft": dx = -10; break;
    case "ArrowRight": dx = 10; break;
    default: return;
  }

  e.preventDefault();
  saveState();

  selected.forEach(el=>{
    const index = el.dataset.index;

    tables[index][1] += dy;
    tables[index][2] += dx;

    el.style.top = tables[index][1] + "px";
    el.style.left = tables[index][2] + "px";
  });
});

/* ===== UNDO / REDO ===== */
document.addEventListener("keydown", function(e){

  if((e.metaKey || e.ctrlKey) && e.key === "z"){
    if(history.length === 0) return;

    const current = tables.map(t => [...t]);
    redoStack.push(current);

    const prev = history.pop();
    restoreState(prev);
  }

  if(
    (e.metaKey && e.shiftKey && e.key === "z") ||
    (e.ctrlKey && e.key === "y")
  ){
    if(redoStack.length === 0) return;

    const current = tables.map(t => [...t]);
    history.push(current);

    const next = redoStack.pop();
    restoreState(next);
  }
});
/* ===== EXPORT TỌA ĐỘ ===== */
function exportTables(){
  let result = "const tables = [\n";

  tables.forEach(t=>{
    result += `  [${t[0]},${Math.round(t[1])},${Math.round(t[2])}],\n`;
  });

  result += "];";

  console.log(result);
  navigator.clipboard.writeText(result);

  alert("Đã copy tọa độ!");
}
window.exportTables = exportTables;
/* ===== SEARCH ===== */

function normalizeTime(input){
  input = input.toLowerCase().replace(/\s/g, "");

  if(/^\d{1,2}h$/.test(input)){
    let h = parseInt(input);
    if(h < 12) h += 12;
    return h + ":00";
  }

  if(/^\d{1,2}g\d{1,2}$/.test(input)){
    let parts = input.split("g");
    let h = parseInt(parts[0]);
    let m = parts[1];
    if(h < 12) h += 12;
    return h + ":" + m.padStart(2, "0");
  }

  if(/^\d{1,2}:\d{1,2}$/.test(input)){
    let parts = input.split(":");
    let h = parseInt(parts[0]);
    let m = parts[1];
    if(h < 12) h += 12;
    return h + ":" + m.padStart(2, "0");
  }

  return input;
}
function searchTable(){
  let keyword = document.getElementById("searchInput").value.toLowerCase().trim();

  // Nếu rỗng → reset toàn bộ
  if(keyword === ""){
    clearSearch();
    return;
  }

  const normalized = normalizeTime(keyword);

  document.querySelectorAll(".table").forEach(el => {
    const text = el.innerText.toLowerCase();

    if(text.includes(keyword) || text.includes(normalized)){
      el.style.opacity = "1";
      el.style.outline = "4px solid yellow";
    } else {
      el.style.opacity = "0.2";
      el.style.outline = "";
    }
  });
}
function clearSearch(){
  document.getElementById("searchInput").value = "";

  document.querySelectorAll(".table").forEach(el => {
    el.style.opacity = "1";
    el.style.outline = ""; // ❗ reset viền vàng
  });
}
// Export các hàm search ra global để HTML dùng được
window.searchTable = searchTable;
window.clearSearch = clearSearch;

// ================== SINGLE TAP ON MOBILE + DOUBLE CLICK ON DESKTOP ==================
const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent) 
              || ('ontouchstart' in window);

if (isMobile) {
  // Trên mobile: chạm 1 lần mở popup
  document.addEventListener('click', function(e) {
    const el = e.target.closest(".table");
    if (!el) return;

    // Ngăn double tap zoom trên mobile
    e.preventDefault();

    openPopup(el.dataset.ban);
  }, { passive: false });
}

// Giữ nguyên double click cho máy tính (không ảnh hưởng)
// Load ban đầu
  document.getElementById("datePicker").value = currentDate;
  loadData();
</script>
